name: tests
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Woechentlicher Lauf als Fruehwarnung, falls neue Releases von
    # ZODB/ZEO/Twisted die Kompatibilitaet brechen.
    - cron: '0 6 * * 1'
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Produktionsumgebung: Versionen wie von Zope 6.1 gepinnt
          - name: "py3.11-zope6.1"
            python-version: "3.11"
            constraints: "zope61"
          # Neueste Versionen aller Dependencies
          - name: "py3.11-latest"
            python-version: "3.11"
            constraints: "latest"
          - name: "py3.12-latest"
            python-version: "3.12"
            constraints: "latest"
          - name: "py3.13-latest"
            python-version: "3.13"
            constraints: "latest"

    runs-on: ubuntu-latest
    name: ${{ matrix.name }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies (Zope 6.1 constraints)
      if: matrix.constraints == 'zope61'
      run: |
        python -m pip install --upgrade pip
        pip install -c https://zopefoundation.github.io/Zope/releases/6.1/constraints.txt -e ".[test]"
    - name: Install dependencies (latest)
      if: matrix.constraints == 'latest'
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"
    - name: Test
      run: python -m zope.testrunner --test-path=src
